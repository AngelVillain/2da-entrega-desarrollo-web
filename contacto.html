<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto | Mi Proyecto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <header class="sticky-top">
        </header>

    <main class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6 card-custom p-4 rounded">
                <h2 class="text-accent mb-4">¿Hablamos?</h2>
                <form>
                    <div class="mb-3">
                        <label class="form-label">Nombre Completo</label>
                        <input type="text" class="form-control bg-dark text-white border-secondary" placeholder="Tu nombre">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control bg-dark text-white border-secondary" placeholder="correo@ejemplo.com">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Mensaje</label>
                        <textarea class="form-control bg-dark text-white border-secondary" rows="4"></textarea>
                    </div>
                    <button type="submit" class="btn btn-accent w-100">Enviar Mensaje</button>
                </form>
            </div>
        </div>
    </main>
</body>
</html>
